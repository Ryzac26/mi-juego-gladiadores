<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WoW: Gladiators Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --alliance: #004a93; --horde: #8c1616; --gold: #f1c40f; --bg: #0b0d0f; --green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        /* Sistema de Pantallas */
        .screen { display: none; height: 100vh; width: 100vw; padding: 20px; flex-direction: column; align-items: center; text-align: center; overflow-y: auto; }
        .active { display: flex !important; }

        /* HUD Superior */
        #hud { background: #1a1c23; padding: 10px; display: none; justify-content: space-around; border-bottom: 2px solid #333; font-size: 14px; width: 100%; position: fixed; top: 0; z-index: 100; }
        .gold-txt { color: var(--gold); font-weight: bold; }

        /* Grid de Selección y Mercado */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 20px; padding-bottom: 100px; }
        .card { background: #23272a; border: 2px solid #444; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.95); border-color: var(--gold); }
        .card h3 { margin: 5px 0; font-size: 16px; }
        .card p { font-size: 11px; color: #bbb; margin: 5px 0; }

        /* Arena y Animaciones */
        .arena { height: 200px; width: 100%; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.imgur.com/3n7S7X8.jpeg') center/cover; border-radius: 15px; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 20px; margin-top: 50px; position: relative; }
        .gladiator { width: 80px; position: relative; }
        .visual { font-size: 60px; filter: drop-shadow(2px 4px 6px black); }
        .weapon-ico { position: absolute; bottom: 0; right: -10px; font-size: 25px; }

        /* Animaciones */
        @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .anim-idle { animation: idle 2s infinite ease-in-out; }
        @keyframes atkR { 0% { transform: translateX(0); } 50% { transform: translateX(60px); } 100% { transform: translateX(0); } }
        .anim-atk-r { animation: atkR 0.4s; }
        @keyframes atkL { 0% { transform: translateX(0); } 50% { transform: translateX(-60px); } 100% { transform: translateX(0); } }
        .anim-atk-l { animation: atkL 0.4s; }
        .shake { animation: shake 0.2s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* Barras de Vida */
        .hp-cont { width: 100%; height: 8px; background: #444; border-radius: 4px; margin-bottom: 5px; overflow: hidden; }
        .hp-bar { height: 100%; background: var(--green); width: 100%; transition: 0.3s; }

        /* Botones de Navegación */
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1c23; display: flex; padding: 15px; gap: 10px; border-top: 2px solid #333; }
        .btn-s { background: #333; color: white; flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; }

        .log { background: rgba(0,0,0,0.8); height: 100px; width: 100%; overflow-y: auto; font-size: 12px; padding: 10px; border-radius: 10px; text-align: left; margin-top: 10px; border: 1px solid #333; }
        #loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; font-weight: bold; }
    </style>
</head>
<body>

    <!-- PANTALLA DE CARGA -->
    <div id="loading-screen">
        <p>CONECTANDO CON AZEROTH...</p>
    </div>

    <!-- HUD SUPERIOR -->
    <div id="hud">
        <span class="gold-txt">💰 <span id="gold-val">0</span></span>
        <span>⚔️ <span id="atk-val">0</span></span>
        <span>🧪 <span id="pot-val">0</span></span>
    </div>

    <!-- PANTALLA 1: SELECCIÓN DE PERSONAJE -->
    <div id="sc-race" class="screen">
        <h1 style="color: var(--gold); margin-top: 40px;">Elige tu Raza</h1>
        <p>Tu aventura comienza hoy</p>
        <div class="grid" id="race-list"></div>
    </div>

    <!-- PANTALLA 2: LOBBY (MENÚ PRINCIPAL) -->
    <div id="sc-lobby" class="screen">
        <h2 id="user-name" style="margin-top: 60px;">Gladiador</h2>
        <div class="gladiator anim-idle" style="margin: 40px auto; width: 120px;">
            <div id="lobby-vis" class="visual">👤</div>
            <div id="lobby-weap" class="weapon-ico"></div>
        </div>
        <button class="btn" onclick="startBattle()" style="font-size: 20px;">⚔️ ENTRAR A LA ARENA</button>
        
        <div class="nav">
            <button class="btn-s" onclick="showScreen('sc-lobby')">Inicio</button>
            <button class="btn-s" onclick="showScreen('sc-market')">Mercado</button>
        </div>
    </div>

    <!-- PANTALLA 3: MERCADO -->
    <div id="sc-market" class="screen">
        <h2 style="margin-top: 60px;">Mercado Negro</h2>
        <div class="grid" id="market-list"></div>
        <div class="nav">
            <button class="btn-s" onclick="showScreen('sc-lobby')">Volver</button>
        </div>
    </div>

    <!-- PANTALLA 4: COMBATE -->
    <div id="sc-combat" class="screen">
        <div class="arena">
            <div>
                <div class="hp-cont"><div id="hp-p" class="hp-bar"></div></div>
                <div id="spr-p" class="gladiator anim-idle"></div>
            </div>
            <div>
                <div class="hp-cont"><div id="hp-e" class="hp-bar"></div></div>
                <div id="spr-e" class="gladiator anim-idle">👹</div>
            </div>
        </div>
        <div id="combat-log" class="log"></div>
        <button id="btn-heal" class="btn" onclick="usePotion()" style="background: #e74c3c; color: white;">🧪 USAR POCIÓN</button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        // --- TUS CREDENCIALES INTEGRADAS ---
        const SUPABASE_URL = 'https://mfortldgznwotnekaswh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb3J0bGRnem53b3RuZWthc3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODc2NzIsImV4cCI6MjA5MDc2MzY3Mn0.EkKBnYUkiDZ3vCr8vqMScowuvYKvhuo3m9qfPsQzab4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const RAZAS = {
            human: { n: "Humano", e: "👨", hp: 100, atk: 15, gold: 1.2, dodge: 0.05 },
            orc: { n: "Orco", e: "🟢", hp: 150, atk: 20, gold: 1.0, dodge: 0.02 },
            elf: { n: "Elfo Noche", e: "🧝", hp: 90, atk: 14, gold: 1.0, dodge: 0.22 },
            undead: { n: "No-Muerto", e: "💀", hp: 95, atk: 17, gold: 1.0, dodge: 0.08 },
            tauren: { n: "Tauren", e: "🐂", hp: 200, atk: 12, gold: 1.0, dodge: 0.01 },
            goblin: { n: "Goblin", e: "👺", hp: 80, atk: 14, gold: 1.7, dodge: 0.10 }
        };

        const MARKET_WEAPONS = [
            { id: "w1", n: "Daga Lenta", e: "🔪", atk: 10, p: 100 },
            { id: "w2", n: "Hacha Horda", e: "🪓", atk: 35, p: 600 },
            { id: "w3", n: "Frostmourne", e: "❄️", atk: 120, p: 4000 }
        ];

        let pData = { id: "", gold: 0, race: "", weapon: null, potions: 1, lvl: 1 };
        let b = { p_hp: 0, p_max: 0, e_hp: 0, e_max: 0, active: false };

        // --- INICIO ---
        window.onload = async () => {
            try {
                const user = tele.initDataUnsafe.user || { id: "test_dev", first_name: "Jugador Local" };
                pData.id = user.id.toString();
                document.getElementById('user-name').innerText = user.first_name;

                // Consultar base de datos
                let { data, error } = await supabase.from('players').select('*').eq('id', pData.id).maybeSingle();
                
                document.getElementById('loading-screen').style.display = 'none';

                if (data && data.race) {
                    pData = data;
                    initLobby();
                } else {
                    // Si no existe el jugador, mostramos selección
                    showScreen('sc-race');
                    renderRaceSelection();
                }
            } catch (e) {
                console.error("Error al iniciar:", e);
                document.getElementById('loading-screen').style.display = 'none';
                showScreen('sc-race'); // Forzar selección en caso de error
                renderRaceSelection();
            }
        };

        function renderRaceSelection() {
            const list = document.getElementById('race-list');
            list.innerHTML = "";
            for (let key in RAZAS) {
                const r = RAZAS[key];
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<h3>${r.e} ${r.n}</h3><p>Vida: ${r.hp}<br>Ataque: ${r.atk}</p>`;
                card.onclick = () => selectRace(key);
                list.appendChild(card);
            }
        }

        async function selectRace(key) {
            pData.race = key;
            pData.gold = 50; // Regalo inicial
            pData.lvl = 1;
            pData.potions = 1;
            
            // Guardar en Supabase
            await supabase.from('players').upsert([pData]);
            initLobby();
        }

        function initLobby() {
            const r = RAZAS[pData.race];
            let wAtk = 0;
            const wObj = MARKET_WEAPONS.find(w => w.id === pData.weapon);
            
            if (wObj) {
                wAtk = wObj.atk;
                document.getElementById('lobby-weap').innerText = wObj.e;
                document.getElementById('spr-p').innerHTML = `<div class="visual">${r.e}</div><div class="weapon-ico">${wObj.e}</div>`;
            } else {
                document.getElementById('spr-p').innerHTML = `<div class="visual">${r.e}</div>`;
            }

            pData.totalAtk = r.atk + wAtk;
            document.getElementById('lobby-vis').innerText = r.e;
            document.getElementById('hud').style.display = 'flex';
            
            updateHUD();
            renderMarket();
            showScreen('sc-lobby');
        }

        function renderMarket() {
            const list = document.getElementById('market-list');
            list.innerHTML = `<h3 style="grid-column: 1/3; margin-top:10px;">Armería</h3>`;
            MARKET_WEAPONS.forEach(w => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<h3>${w.e} ${w.n}</h3><p>+${w.atk} Atk</p><div class="price">${pData.weapon === w.id ? 'EQUIPADO' : '💰 '+w.p}</div>`;
                card.onclick = () => buyWeapon(w);
                list.appendChild(card);
            });
            list.innerHTML += `<h3 style="grid-column: 1/3; margin-top:10px;">Objetos</h3>`;
            const pCard = document.createElement('div');
            pCard.className = "card";
            pCard.innerHTML = `<h3>🧪 Poción Roja</h3><p>Cura 50 HP</p><div class="price">💰 40</div>`;
            pCard.onclick = () => buyPotion();
            list.appendChild(pCard);
        }

        async function buyWeapon(w) {
            if (pData.gold >= w.p && pData.weapon !== w.id) {
                pData.gold -= w.p;
                pData.weapon = w.id;
                await saveDB();
                initLobby();
            }
        }

        async function buyPotion() {
            if (pData.gold >= 40) {
                pData.gold -= 40;
                pData.potions++;
                await saveDB();
                updateHUD();
            }
        }

        // --- COMBATE ---
        function startBattle() {
            const r = RAZAS[pData.race];
            b.p_max = r.hp;
            b.p_hp = r.hp;
            b.e_max = 50 + (pData.lvl * 25);
            b.e_hp = b.e_max;
            b.active = true;
            
            showScreen('sc-combat');
            updateHP();
            log("¡Enemigo detectado en la arena!");
            setTimeout(battleLoop, 1000);
        }

        async function battleLoop() {
            if (!b.active) return;

            // Turno Jugador
            await animate('spr-p', 'anim-atk-r');
            b.e_hp -= pData.totalAtk;
            hitEffect('spr-e');
            log(`Golpeas al enemigo: -${pData.totalAtk} HP`);
            updateHP();

            if (b.e_hp <= 0) return endBattle(true);

            // Turno Enemigo
            setTimeout(async () => {
                await animate('spr-e', 'anim-atk-l');
                let dmg = 8 + (pData.lvl * 3);
                
                if (Math.random() < RAZAS[pData.race].dodge) {
                    log("¡ESQUIVASTE EL GOLPE!");
                } else {
                    b.p_hp -= dmg;
                    hitEffect('spr-p');
                    log(`El enemigo te hiere: -${dmg} HP`);
                }
                updateHP();

                if (b.p_hp <= 0) return endBattle(false);
                setTimeout(battleLoop, 1200);
            }, 800);
        }

        function usePotion() {
            if (pData.potions > 0 && b.active) {
                pData.potions--;
                b.p_hp = Math.min(b.p_max, b.p_hp + 50);
                updateHP();
                updateHUD();
                log("🧪 ¡Usaste poción! +50 Salud");
                saveDB();
            }
        }

        async function endBattle(win) {
            b.active = false;
            if (win) {
                let reward = Math.floor(50 * RAZAS[pData.race].gold);
                pData.gold += reward;
                pData.lvl++;
                log(`<span style="color:var(--gold)">¡GANASTE! +${reward} Oro</span>`);
            } else {
                log("<span style='color:red'>HAS MUERTO...</span>");
            }
            await saveDB();
            setTimeout(initLobby, 2500);
        }

        // --- UTILIDADES ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function updateHUD() {
            document.getElementById('gold-val').innerText = pData.gold;
            document.getElementById('atk-val').innerText = pData.totalAtk;
            document.getElementById('pot-val').innerText = pData.potions;
        }
        function updateHP() {
            document.getElementById('hp-p').style.width = (b.p_hp / b.p_max * 100) + "%";
            document.getElementById('hp-e').style.width = (b.e_hp / b.e_max * 100) + "%";
        }
        function log(m) {
            const l = document.getElementById('combat-log');
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }
        async function animate(id, cl) {
            const el = document.getElementById(id);
            el.classList.add(cl);
            return new Promise(r => setTimeout(() => { el.classList.remove(cl); r(); }, 400));
        }
        function hitEffect(id) {
            const el = document.getElementById(id);
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('shake'), 200);
        }
        async function saveDB() {
            await supabase.from('players').upsert([pData]);
        }
    </script>
</body>
</html>
