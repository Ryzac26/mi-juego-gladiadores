<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gladiadores Arena</title>
    <!-- Carga de Librerías -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #f1c40f; --bg: #0b0d0f; --green: #2ecc71; --red: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; }
        
        /* Pantallas */
        .screen { display: none; height: 100vh; width: 100vw; padding: 20px; flex-direction: column; align-items: center; text-align: center; overflow-y: auto; }
        .active { display: flex !important; }

        /* HUD */
        #hud { background: #16191d; padding: 12px; display: none; justify-content: space-around; border-bottom: 1px solid #333; font-size: 14px; width: 100%; position: fixed; top: 0; z-index: 100; }
        
        /* Selección de Personaje */
        .race-box { background: #1c1f24; border: 1px solid #444; border-radius: 15px; padding: 25px; margin: 10px; width: 100%; cursor: pointer; transition: 0.2s; }
        .race-box:active { border-color: var(--gold); background: #252a31; }
        .race-box h2 { color: var(--gold); margin: 5px 0; }
        .race-box p { font-size: 13px; color: #aaa; margin: 5px 0; }

        /* Arena */
        .arena { height: 200px; width: 100%; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://i.imgur.com/3n7S7X8.jpeg') center/cover; border-radius: 15px; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 20px; margin-top: 50px; position: relative; }
        .visual { font-size: 60px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); }
        .weapon-ico { position: absolute; bottom: 0; right: -10px; font-size: 25px; }

        /* Animaciones de Combate */
        .anim-idle { animation: idle 2s infinite ease-in-out; }
        @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .atk-r { animation: atkR 0.4s; } @keyframes atkR { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(50px); } }
        .atk-l { animation: atkL 0.4s; } @keyframes atkL { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-50px); } }
        .shake { animation: shake 0.2s; } @keyframes shake { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(5px); } }

        /* Vida */
        .hp-cont { width: 80px; height: 6px; background: #333; border-radius: 3px; margin-bottom: 5px; overflow: hidden; }
        .hp-bar { height: 100%; background: var(--green); width: 100%; transition: 0.3s; }

        /* Botones y UI */
        .btn { background: var(--gold); color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; font-size: 16px; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #16191d; display: flex; padding: 15px; gap: 10px; border-top: 1px solid #333; }
        .btn-s { background: #252a31; color: white; flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; font-size: 13px; }
        .log { background: rgba(0,0,0,0.8); height: 100px; width: 100%; overflow-y: auto; font-size: 12px; padding: 10px; border-radius: 10px; text-align: left; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <!-- HUD (SE MUESTRA CUANDO HAY PERSONAJE) -->
    <div id="hud">
        <span>💰 <span id="gold-val">0</span></span>
        <span>⚔️ <span id="atk-val">0</span></span>
        <span>🧪 <span id="pot-val">0</span></span>
    </div>

    <!-- PANTALLA 1: SELECCIÓN (VISIBLE POR DEFECTO PARA EVITAR PANTALLA NEGRA) -->
    <div id="sc-race" class="screen active">
        <h1 style="margin-top: 40px; color: var(--gold);">ELIGE TU BANDO</h1>
        <div class="race-box" onclick="selectRace('human')">
            <h2>👨 HUMANO</h2>
            <p>Especialidad: Ganancia de Oro x1.3</p>
            <p>Vida: 110 | Ataque: 15</p>
        </div>
        <div class="race-box" onclick="selectRace('undead')">
            <h2>💀 NO-MUERTO</h2>
            <p>Especialidad: Esquivar ataques 15%</p>
            <p>Vida: 90 | Ataque: 20</p>
        </div>
    </div>

    <!-- PANTALLA 2: LOBBY -->
    <div id="sc-lobby" class="screen">
        <h2 id="user-name" style="margin-top: 60px;">GLADIADOR</h2>
        <div class="anim-idle" style="margin: 40px auto; position: relative; width: 80px;">
            <div id="lobby-vis" class="visual">👤</div>
            <div id="lobby-weap" class="weapon-ico"></div>
        </div>
        <button class="btn" onclick="startBattle()">ENTRAR A LA ARENA</button>
        <div class="nav">
            <button class="btn-s" onclick="showScreen('sc-lobby')">INICIO</button>
            <button class="btn-s" onclick="showScreen('sc-market')">MERCADO</button>
        </div>
    </div>

    <!-- PANTALLA 3: MERCADO -->
    <div id="sc-market" class="screen">
        <h2 style="margin-top: 60px;">MERCADO</h2>
        <div id="market-list" style="width: 100%;"></div>
        <div class="nav">
            <button class="btn-s" onclick="showScreen('sc-lobby')">VOLVER</button>
        </div>
    </div>

    <!-- PANTALLA 4: COMBATE -->
    <div id="sc-combat" class="screen">
        <div class="arena">
            <div>
                <div class="hp-cont"><div id="hp-p" class="hp-bar"></div></div>
                <div id="spr-p" class="anim-idle"></div>
            </div>
            <div>
                <div class="hp-cont"><div id="hp-e" class="hp-bar"></div></div>
                <div id="spr-e" class="anim-idle">👹</div>
            </div>
        </div>
        <div id="combat-log" class="log"></div>
        <button id="btn-heal" class="btn" onclick="usePotion()" style="background: var(--red); color: white;">🧪 USAR POCIÓN</button>
    </div>

    <script>
        // INICIALIZACIÓN
        const tele = window.Telegram.WebApp;
        tele.expand();

        const SUPABASE_URL = 'https://mfortldgznwotnekaswh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1mb3J0bGRnem53b3RuZWthc3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODc2NzIsImV4cCI6MjA5MDc2MzY3Mn0.EkKBnYUkiDZ3vCr8vqMScowuvYKvhuo3m9qfPsQzab4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const RAZAS = {
            human: { n: "Humano", e: "👨", hp: 110, atk: 15, gold: 1.3, dodge: 0.05 },
            undead: { n: "No-Muerto", e: "💀", hp: 90, atk: 20, gold: 1.0, dodge: 0.15 }
        };

        const WEAPONS = [
            { id: "w1", n: "Daga", e: "🔪", atk: 12, p: 100 },
            { id: "w2", n: "Espada", e: "⚔️", atk: 35, p: 600 },
            { id: "w3", n: "Segadora", e: "🗡️", atk: 110, p: 4000 }
        ];

        let pData = { id: "", gold: 0, race: "", weapon: null, potions: 1, lvl: 1 };
        let battle = { active: false, p_hp: 0, p_max: 0, e_hp: 0, e_max: 0 };

        // ARRANQUE DEL JUEGO
        window.addEventListener('DOMContentLoaded', async () => {
            const user = tele.initDataUnsafe.user || { id: "dev_test", first_name: "Gladiador" };
            pData.id = user.id.toString();
            document.getElementById('user-name').innerText = user.first_name.toUpperCase();

            try {
                const { data, error } = await supabase.from('players').select('*').eq('id', pData.id).maybeSingle();
                if (data && data.race) {
                    pData = data;
                    initLobby();
                }
            } catch (err) {
                console.log("Error de conexión, esperando selección manual.");
            }
        });

        async function selectRace(key) {
            pData.race = key;
            pData.gold = 50;
            pData.lvl = 1;
            pData.potions = 1;
            await supabase.from('players').upsert([pData]);
            initLobby();
        }

        function initLobby() {
            const r = RAZAS[pData.race];
            let wAtk = 0;
            const wObj = WEAPONS.find(w => w.id === pData.weapon);
            
            if (wObj) {
                wAtk = wObj.atk;
                document.getElementById('lobby-weap').innerText = wObj.e;
                document.getElementById('spr-p').innerHTML = `<div class="visual">${r.e}</div><div class="weapon-ico">${wObj.e}</div>`;
            } else {
                document.getElementById('spr-p').innerHTML = `<div class="visual">${r.e}</div>`;
            }

            pData.totalAtk = r.atk + wAtk;
            document.getElementById('lobby-vis').innerText = r.e;
            document.getElementById('hud').style.display = 'flex';
            
            updateHUD();
            renderMarket();
            showScreen('sc-lobby');
        }

        function renderMarket() {
            const list = document.getElementById('market-list');
            list.innerHTML = `<h3 style="margin:20px 0 10px">ARMAS</h3>`;
            WEAPONS.forEach(w => {
                list.innerHTML += `
                    <div class="race-box" onclick="buyWeapon('${w.id}')" style="padding:15px; margin:5px 0;">
                        <h3 style="margin:0">${w.e} ${w.n}</h3>
                        <p>+${w.atk} Daño | 💰 ${w.p}</p>
                    </div>`;
            });
            list.innerHTML += `<h3 style="margin:20px 0 10px">POCIONES</h3>
                <div class="race-box" onclick="buyPotion()" style="padding:15px; margin:5px 0;">
                    <h3 style="margin:0">🧪 Poción Roja</h3>
                    <p>Cura 50 HP | 💰 40</p>
                </div>`;
        }

        async function buyWeapon(id) {
            const w = WEAPONS.find(x => x.id === id);
            if (pData.gold >= w.p && pData.weapon !== id) {
                pData.gold -= w.p;
                pData.weapon = id;
                await saveDB();
                initLobby();
            }
        }

        async function buyPotion() {
            if (pData.gold >= 40) {
                pData.gold -= 40;
                pData.potions++;
                await saveDB();
                updateHUD();
            }
        }

        function startBattle() {
            const r = RAZAS[pData.race];
            battle.p_max = r.hp;
            battle.p_hp = r.hp;
            battle.e_max = 60 + (pData.lvl * 25);
            battle.e_hp = battle.e_max;
            battle.active = true;
            
            showScreen('sc-combat');
            updateHP();
            log("¡Un rival aparece!");
            setTimeout(battleLoop, 1000);
        }

        async function battleLoop() {
            if (!battle.active) return;

            // Jugador ataca
            animate('spr-p', 'atk-r');
            battle.e_hp -= pData.totalAtk;
            setTimeout(() => hitEffect('spr-e'), 200);
            log(`Atacas: -${pData.totalAtk} HP`);
            updateHP();

            if (battle.e_hp <= 0) return endBattle(true);

            // Enemigo ataca
            setTimeout(() => {
                animate('spr-e', 'atk-l');
                let dmg = 10 + (pData.lvl * 2);
                if (Math.random() < RAZAS[pData.race].dodge) {
                    log("¡Esquivaste!");
                } else {
                    battle.p_hp -= dmg;
                    setTimeout(() => hitEffect('spr-p'), 200);
                    log(`Recibes: -${dmg} HP`);
                }
                updateHP();

                if (battle.p_hp <= 0) return endBattle(false);
                setTimeout(battleLoop, 1200);
            }, 800);
        }

        function usePotion() {
            if (pData.potions > 0 && battle.active) {
                pData.potions--;
                battle.p_hp = Math.min(battle.p_max, battle.p_hp + 50);
                updateHP();
                updateHUD();
                log("🧪 ¡Curación +50!");
                saveDB();
            }
        }

        async function endBattle(win) {
            battle.active = false;
            if (win) {
                let reward = Math.floor(50 * RAZAS[pData.race].gold);
                pData.gold += reward;
                pData.lvl++;
                log(`¡Victoria! +${reward} Oro`);
            } else {
                log("Derrota...");
            }
            await saveDB();
            setTimeout(initLobby, 2000);
        }

        // HELPERS
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function updateHUD() {
            document.getElementById('gold-val').innerText = pData.gold;
            document.getElementById('atk-val').innerText = pData.totalAtk;
            document.getElementById('pot-val').innerText = pData.potions;
        }
        function updateHP() {
            document.getElementById('hp-p').style.width = (battle.p_hp / battle.p_max * 100) + "%";
            document.getElementById('hp-e').style.width = (battle.e_hp / battle.e_max * 100) + "%";
        }
        function log(m) {
            const l = document.getElementById('combat-log');
            l.innerHTML += `> ${m}<br>`;
            l.scrollTop = l.scrollHeight;
        }
        function animate(id, cl) {
            const el = document.getElementById(id);
            el.classList.add(cl);
            setTimeout(() => el.classList.remove(cl), 400);
        }
        function hitEffect(id) {
            const el = document.getElementById(id);
            el.classList.add('shake');
            setTimeout(() => el.classList.remove('shake'), 200);
        }
        async function saveDB() {
            await supabase.from('players').upsert([pData]);
        }
    </script>
</body>
</html>
