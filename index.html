<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WoW: Gladiators Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --alliance: #004a93; --horde: #8c1616; --gold: #f1c40f; --bg: #0b0d0f; --green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        /* Sistema de Pantallas */
        .screen { display: none; height: 100vh; width: 100vw; padding: 15px; overflow-y: auto; text-align: center; }
        .active { display: flex; flex-direction: column; }

        /* HUD Superior */
        .hud { background: #1a1c23; padding: 10px; display: flex; justify-content: space-around; border-bottom: 2px solid #333; font-size: 14px; font-weight: bold; }
        .gold-txt { color: var(--gold); }

        /* Estilo de Cartas (Razas/Items) */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; padding-bottom: 50px; }
        .card { background: #23272a; border: 2px solid #444; border-radius: 10px; padding: 12px; cursor: pointer; transition: 0.2s; position: relative; }
        .card:active { transform: scale(0.95); border-color: var(--gold); }
        .card h3 { margin: 5px 0; font-size: 14px; }
        .card p { font-size: 10px; color: #aaa; margin: 5px 0; }
        .price { color: var(--gold); font-weight: bold; font-size: 12px; }

        /* Arena y Animaciones */
        .arena { height: 220px; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.imgur.com/3n7S7X8.jpeg') center/cover; border-radius: 15px; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 30px; margin: 15px 0; position: relative; }
        .gladiator { width: 80px; position: relative; transition: 0.2s; }
        .visual { font-size: 55px; filter: drop-shadow(2px 4px 6px black); }
        .weapon-ico { position: absolute; bottom: 0; right: -5px; font-size: 25px; }

        /* Animaciones CSS */
        @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .anim-idle { animation: idle 2.5s infinite ease-in-out; }
        @keyframes atkR { 0% { transform: translateX(0); } 50% { transform: translateX(80px) scale(1.2); } 100% { transform: translateX(0); } }
        .anim-atk-r { animation: atkR 0.4s; }
        @keyframes atkL { 0% { transform: translateX(0); } 50% { transform: translateX(-80px) scale(1.2); } 100% { transform: translateX(0); } }
        .anim-atk-l { animation: atkL 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 60% { transform: translateX(8px); } }
        .anim-shake { animation: shake 0.2s; }

        /* Barras de Vida */
        .hp-cont { width: 100%; height: 8px; background: #444; border-radius: 4px; margin-bottom: 5px; border: 1px solid #000; }
        .hp-bar { height: 100%; background: var(--green); width: 100%; transition: 0.4s; }

        /* Botones y Navegación */
        .btn { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1c23; display: flex; padding: 10px; gap: 10px; border-top: 2px solid #333; }
        .btn-s { background: #333; color: white; flex: 1; padding: 10px; font-size: 12px; }

        .log { background: rgba(0,0,0,0.8); height: 80px; overflow-y: auto; font-size: 11px; padding: 10px; border-radius: 10px; text-align: left; border: 1px solid #444; }
        .potion-badge { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 10px; position: absolute; top: -5px; right: -5px; font-size: 10px; }
    </style>
</head>
<body>

    <div class="hud">
        <span class="gold-txt">💰 <span id="gold-val">0</span></span>
        <span>⚔️ ATK: <span id="atk-val">0</span></span>
        <span>🧪 <span id="pot-val">0</span></span>
    </div>

    <!-- PANTALLA: SELECCIÓN ÚNICA DE RAZA -->
    <div id="sc-race" class="screen">
        <h2>Elige tu Raza</h2>
        <p>Esta decisión será permanente</p>
        <div class="grid" id="race-list"></div>
    </div>

    <!-- PANTALLA: LOBBY -->
    <div id="sc-lobby" class="screen">
        <h2 id="user-name">Héroe</h2>
        <div class="gladiator anim-idle" style="margin: 40px auto; width: 100px;">
            <div id="lobby-vis" class="visual">🛡️</div>
            <div id="lobby-weap" class="weapon-ico"></div>
        </div>
        <button class="btn" onclick="startBattle()" style="font-size: 18px;">⚔️ PELEAR</button>
        <div class="nav">
            <button class="btn-s" onclick="showScreen('sc-lobby')">Inicio</button>
            <button class="btn-s" onclick="showScreen('sc-market')">Mercado</button>
        </div>
    </div>

    <!-- PANTALLA: MERCADO -->
    <div id="sc-market" class="screen">
        <h2>Mercado Negro</h2>
        <div class="grid" id="market-list"></div>
        <div class="nav">
            <button class="btn-s" onclick="showScreen('sc-lobby')">Cerrar</button>
        </div>
    </div>

    <!-- PANTALLA: COMBATE -->
    <div id="sc-combat" class="screen">
        <div class="arena">
            <div>
                <div class="hp-cont"><div id="hp-p" class="hp-bar"></div></div>
                <div id="spr-p" class="gladiator anim-idle"></div>
            </div>
            <div>
                <div class="hp-cont"><div id="hp-e" class="hp-bar"></div></div>
                <div id="spr-e" class="gladiator anim-idle">👹</div>
            </div>
        </div>
        <div id="combat-log" class="log">Buscando oponente...</div>
        <button id="btn-heal" class="btn" onclick="usePotion()" style="background: #e74c3c; color: white;">🧪 USAR POCIÓN</button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        // 1. CONFIGURACIÓN SUPABASE
        const SUPABASE_URL = 'TU_URL_DE_SUPABASE';
        const SUPABASE_KEY = 'TU_KEY_DE_SUPABASE';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. DATOS DEL JUEGO
        const RAZAS = {
            human: { n: "Humano", e: "👨", hp: 100, atk: 15, gold: 1.2, dodge: 0.05 },
            orc: { n: "Orco", e: "🟢", hp: 140, atk: 18, gold: 1.0, dodge: 0.03 },
            elf: { n: "Elfo Noche", e: "🧝", hp: 90, atk: 14, gold: 1.0, dodge: 0.18 },
            undead: { n: "No-Muerto", e: "💀", hp: 95, atk: 16, gold: 1.0, dodge: 0.08 },
            tauren: { n: "Tauren", e: "🐂", hp: 180, atk: 11, gold: 1.0, dodge: 0.01 },
            goblin: { n: "Goblin", e: "👺", hp: 80, atk: 14, gold: 1.6, dodge: 0.08 }
        };

        const MARKET = {
            weapons: [
                { id: "sword1", n: "Daga", e: "🔪", atk: 10, p: 150 },
                { id: "sword2", n: "Hacha", e: "🪓", atk: 30, p: 600 },
                { id: "sword3", n: "Frostmourne", e: "❄️", atk: 120, p: 5000 }
            ],
            potions: { n: "Poción Roja", e: "🧪", heal: 50, p: 50 }
        };

        let pData = { id: "", gold: 0, race: "", weapon: null, potions: 0, lvl: 1 };
        let battle = { p_hp: 0, p_max: 0, e_hp: 0, e_max: 0, active: false };

        // 3. INICIALIZACIÓN
        window.onload = async () => {
            const user = tele.initDataUnsafe.user || { id: "dev_test", first_name: "Admin" };
            pData.id = user.id.toString();
            document.getElementById('user-name').innerText = user.first_name;

            let { data } = await supabase.from('players').select('*').eq('id', pData.id);
            
            if (data && data.length > 0) {
                pData = data[0];
                if (pData.race) {
                    initLobby();
                } else {
                    showScreen('sc-race');
                    renderRaceSelection();
                }
            } else {
                // Crear nuevo perfil
                await supabase.from('players').insert([{ id: pData.id, name: user.first_name, gold: 0, potions: 0 }]);
                showScreen('sc-race');
                renderRaceSelection();
            }
        };

        function renderRaceSelection() {
            const list = document.getElementById('race-list');
            list.innerHTML = "";
            for (let key in RAZAS) {
                const r = RAZAS[key];
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<h3>${r.e} ${r.n}</h3><p>HP: ${r.hp} | ATK: ${r.atk}</p>`;
                card.onclick = () => selectRace(key);
                list.appendChild(card);
            }
        }

        async function selectRace(key) {
            pData.race = key;
            await supabase.from('players').update({ race: key }).eq('id', pData.id);
            initLobby();
        }

        function initLobby() {
            const r = RAZAS[pData.race];
            let weaponAtk = 0;
            if (pData.weapon) {
                const w = MARKET.weapons.find(i => i.id === pData.weapon);
                weaponAtk = w.atk;
                document.getElementById('lobby-weap').innerText = w.e;
                document.getElementById('spr-p').innerHTML = `<div class="visual">${r.e}</div><div class="weapon-ico">${w.e}</div>`;
            } else {
                document.getElementById('spr-p').innerHTML = `<div class="visual">${r.e}</div>`;
            }
            
            pData.totalAtk = r.atk + weaponAtk;
            document.getElementById('lobby-vis').innerText = r.e;
            updateHUD();
            renderMarket();
            showScreen('sc-lobby');
        }

        function renderMarket() {
            const list = document.getElementById('market-list');
            list.innerHTML = `<h3>Armas</h3>`;
            MARKET.weapons.forEach(w => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<h3>${w.e} ${w.n}</h3><p>+${w.atk} ATK</p><div class="price">${pData.weapon === w.id ? 'EQUIPADO' : '💰 '+w.p}</div>`;
                card.onclick = () => buyWeapon(w);
                list.appendChild(card);
            });
            list.innerHTML += `<h3 style="grid-column: 1/3">Consumibles</h3>`;
            const pot = MARKET.potions;
            const pCard = document.createElement('div');
            pCard.className = "card";
            pCard.innerHTML = `<h3>${pot.e} ${pot.n}</h3><p>Cura ${pot.heal} HP</p><div class="price">💰 ${pot.p}</div>`;
            pCard.onclick = () => buyPotion();
            list.appendChild(pCard);
        }

        async function buyWeapon(w) {
            if (pData.gold >= w.p && pData.weapon !== w.id) {
                pData.gold -= w.p;
                pData.weapon = w.id;
                await save();
                initLobby();
            }
        }

        async function buyPotion() {
            if (pData.gold >= MARKET.potions.p) {
                pData.gold -= MARKET.potions.p;
                pData.potions++;
                await save();
                updateHUD();
                renderMarket();
            }
        }

        // 4. COMBATE
        function startBattle() {
            const r = RAZAS[pData.race];
            battle.p_max = r.hp;
            battle.p_hp = r.hp;
            battle.e_max = 60 + (pData.lvl * 15);
            battle.e_hp = battle.e_max;
            battle.active = true;
            
            showScreen('sc-combat');
            updateHP();
            log("¡Un enemigo aparece!");
            setTimeout(battleTurn, 1000);
        }

        async function battleTurn() {
            if (!battle.active) return;

            // Turno Jugador
            await animate('spr-p', 'anim-atk-r');
            battle.e_hp -= pData.totalAtk;
            hitEffect('spr-e');
            log(`Atacas con fuerza: -${pData.totalAtk}`);
            updateHP();

            if (battle.e_hp <= 0) return endBattle(true);

            // Turno Enemigo
            setTimeout(async () => {
                await animate('spr-e', 'anim-atk-l');
                const dmg = 8 + (pData.lvl * 3);
                battle.p_hp -= dmg;
                hitEffect('spr-p');
                log(`Enemigo golpea: -${dmg}`);
                updateHP();

                if (battle.p_hp <= 0) return endBattle(false);
                setTimeout(battleTurn, 1200);
            }, 800);
        }

        function usePotion() {
            if (pData.potions > 0 && battle.active) {
                pData.potions--;
                battle.p_hp = Math.min(battle.p_max, battle.p_hp + MARKET.potions.heal);
                updateHP();
                updateHUD();
                log("🧪 ¡Usaste una poción! +50 HP");
                save();
            }
        }

        async function endBattle(win) {
            battle.active = false;
            if (win) {
                const reward = Math.floor(40 * RAZAS[pData.race].gold);
                pData.gold += reward;
                pData.lvl++;
                log(`<span style="color:var(--gold)">¡VICTORIA! +${reward} Oro</span>`);
            } else {
                log("<span style='color:red'>HAS CAÍDO...</span>");
                document.getElementById('spr-p').style.opacity = "0.5";
            }
            await save();
            setTimeout(() => {
                document.getElementById('spr-p').style.opacity = "1";
                initLobby();
            }, 2500);
        }

        // 5. UTILIDADES
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function updateHUD() {
            document.getElementById('gold-val').innerText = pData.gold;
            document.getElementById('atk-val').innerText = pData.totalAtk;
            document.getElementById('pot-val').innerText = pData.potions;
        }
        function updateHP() {
            document.getElementById('hp-p').style.width = (battle.p_hp / battle.p_max * 100) + "%";
            document.getElementById('hp-e').style.width = (battle.e_hp / battle.e_max * 100) + "%";
        }
        function log(m) {
            const l = document.getElementById('combat-log');
            l.innerHTML += `<br>> ${m}`;
            l.scrollTop = l.scrollHeight;
        }
        async function animate(id, cl) {
            const el = document.getElementById(id);
            el.classList.add(cl);
            return new Promise(r => setTimeout(() => { el.classList.remove(cl); r(); }, 400));
        }
        function hitEffect(id) {
            const el = document.getElementById(id);
            el.classList.add('anim-shake');
            setTimeout(() => el.classList.remove('anim-shake'), 200);
        }
        async function save() {
            await supabase.from('players').update(pData).eq('id', pData.id);
        }
    </script>
</body>
</html>
