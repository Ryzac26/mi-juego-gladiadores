<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gladiator Conquest - Telegram</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #555; }
    </style>
</head>
<body>

<script>
const CONFIG_ECONOMY = {
    GOLD_TO_USD: 10000, // 10,000 Oro = $1.00 USD aprox para balancear
    ENERGY_MAX: 100,
    REGEN_RATE: 5 // Segundos por punto de energía
};

let userData = JSON.parse(localStorage.getItem('gladiator_save_v2')) || {
    gold: 500,
    tokens: 0,
    energy: 100,
    lvlGlad: 1,
    lvlBeast: 1,
    lastUpdate: Date.now()
};

class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }

    preload() {
        // Cargamos imágenes reales de servidores públicos para que se vea bien
        this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
        this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
        this.load.image('gladiator', 'https://labs.phaser.io/assets/sprites/knight.png');
        this.load.image('beast', 'https://labs.phaser.io/assets/sprites/slime.png');
        this.load.image('dummy', 'https://labs.phaser.io/assets/sprites/treasurechest.png');
        this.load.image('coin', 'https://labs.phaser.io/assets/sprites/coin.png');
    }

    create() {
        const { width, height } = this.scale;

        // --- ESCENARIO ---
        this.add.image(width/2, height/2, 'sky').setDisplaySize(width, height).setAlpha(0.7);
        let floor = this.add.tileSprite(width/2, height - 250, width, 100, 'ground').setTint(0x8B4513);

        // --- PERSONAJES ---
        // Nuestro Gladiador
        this.player = this.add.sprite(width * 0.3, height - 320, 'gladiator').setScale(1.5);
        this.playerLabel = this.add.text(this.player.x, this.player.y - 60, "NIV. " + userData.lvlGlad, { fontSize: '16px', fontWeight: 'bold' }).setOrigin(0.5);

        // La Bestia de compañía
        this.pet = this.add.sprite(this.player.x - 60, this.player.y + 20, 'beast').setScale(0.8).setTint(0x00ff00);
        
        // El Objetivo (Dummy de entrenamiento)
        this.target = this.add.sprite(width * 0.7, height - 320, 'dummy').setScale(1.2);

        // --- INTERFAZ SUPERIOR (HUD) ---
        let headerBg = this.add.rectangle(width/2, 60, width, 120, 0x000000, 0.6);
        
        this.goldIcon = this.add.image(30, 40, 'coin').setScale(0.6);
        this.goldText = this.add.text(60, 30, "ORO: 0", { fontSize: '20px', fill: '#FFD700', fontWeight: 'bold' });
        
        this.usdText = this.add.text(60, 60, "VALOR: $0.00 USD", { fontSize: '16px', fill: '#00FF00' });

        this.energyBarBg = this.add.rectangle(width - 110, 45, 150, 20, 0x333333);
        this.energyBar = this.add.rectangle(width - 110, 45, 150, 20, 0x0000FF);
        this.energyText = this.add.text(width - 185, 70, "ENERGÍA: 100/100", { fontSize: '14px' });

        // --- PANEL DE BOTONES (ESTILO MÓVIL) ---
        this.createMenuButton(width * 0.5, height - 160, "ENTRENAR (+ORO)", 0xF39C12, () => this.doTrain());
        this.createMenuButton(width * 0.5, height - 100, "MEJORAR GUERRERO", 0x3498DB, () => this.upgradeGlad());
        this.createMenuButton(width * 0.5, height - 40, "FUSIONAR BESTIA", 0x2ECC71, () => this.upgradeBeast());

        // Ciclo de ganancias pasivas
        this.time.addEvent({ delay: 1000, callback: this.passiveLoop, callbackScope: this, loop: true });
    }

    update() {
        // Actualización visual de textos
        this.goldText.setText("ORO: " + Math.floor(userData.gold).toLocaleString());
        this.usdText.setText("VALOR ACUM: $" + (userData.gold / CONFIG_ECONOMY.GOLD_TO_USD).toFixed(2) + " USD");
        
        // Actualizar barra de energía
        let enWidth = (userData.energy / CONFIG_ECONOMY.ENERGY_MAX) * 150;
        this.energyBar.width = enWidth;
        this.energyText.setText(`ENERGÍA: ${Math.floor(userData.energy)}/100`);
    }

    doTrain() {
        if (userData.energy >= 1) {
            userData.energy -= 1;
            userData.gold += (userData.lvlGlad * 5);
            
            // Animación de ataque
            this.tweens.add({
                targets: this.player,
                x: this.player.x + 50,
                duration: 50,
                yoyo: true,
                onComplete: () => {
                    // Animación del objetivo al ser golpeado
                    this.tweens.add({ targets: this.target, angle: { from: -10, to: 10 }, duration: 50, yoyo: true });
                }
            });
        }
    }

    upgradeGlad() {
        let cost = userData.lvlGlad * 200;
        if (userData.gold >= cost) {
            userData.gold -= cost;
            userData.lvlGlad++;
            this.playerLabel.setText("NIV. " + userData.lvlGlad);
            this.player.setScale(1.5 + (userData.lvlGlad * 0.05));
            alert("¡Gladiador mejorado!");
        }
    }

    upgradeBeast() {
        let cost = userData.lvlBeast * 1000;
        if (userData.gold >= cost) {
            userData.gold -= cost;
            userData.lvlBeast++;
            this.pet.setTint(Math.random() * 0xffffff); // Cambia de color al fusionar
            alert("¡Bestia Nivel " + userData.lvlBeast + "! Bono pasivo aumentado.");
        }
    }

    passiveLoop() {
        // Oro pasivo según niveles
        userData.gold += (userData.lvlGlad * 2) + (userData.lvlBeast * 10);
        
        // Regenerar energía
        if (userData.energy < CONFIG_ECONOMY.ENERGY_MAX) {
            userData.energy = Math.min(CONFIG_ECONOMY.ENERGY_MAX, userData.energy + (1 / CONFIG_ECONOMY.REGEN_RATE));
        }

        localStorage.setItem('gladiator_save_v2', JSON.stringify(userData));
    }

    createMenuButton(x, y, text, color, action) {
        let btn = this.add.container(x, y);
        let rect = this.add.rectangle(0, 0, 320, 50, color).setInteractive({ useHandCursor: true });
        let txt = this.add.text(0, 0, text, { fontSize: '18px', fontWeight: 'bold', fill: '#fff' }).setOrigin(0.5);
        
        rect.on('pointerdown', () => {
            rect.setAlpha(0.7);
            action();
        });
        rect.on('pointerup', () => rect.setAlpha(1));
        
        btn.add([rect, txt]);
    }
}

const config = {
    type: Phaser.AUTO,
    width: 400,
    height: 700,
    scene: GameScene,
    physics: { default: 'arcade' }
};

const game = new Phaser.Game(config);
</script>

</body>
</html>
