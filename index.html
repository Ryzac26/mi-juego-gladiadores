<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titan Mining Cloud</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
        .header { background: var(--card); padding: 25px; text-align: center; border-bottom: 2px solid var(--neon); }
        .balance { font-size: 2.8em; color: var(--neon); font-weight: bold; margin: 10px 0; }
        .plan-container { padding: 15px; }
        .plan-card {
            background: var(--card); border: 1px solid #30363d; border-radius: 12px;
            padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .plan-info b { color: var(--neon); font-size: 1.1em; display: block; }
        .plan-info span { font-size: 0.8em; color: #8b949e; }
        .btn-buy { background: var(--neon); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .crypto-tag { font-size: 0.7em; color: #58a6ff; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 0.8em; color: #8b949e;">BALANCE ACUMULADO (USD)</div>
        <div class="balance">$<span id="bal">0.000000</span></div>
        <div style="font-size: 0.7em;">Potencia: <span id="hash">0.0</span> GH/s</div>
    </div>

    <div class="plan-container" id="plans"></div>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "https://mi-juego-gladiadores.onrender.com";
        tg.expand();

        const services = [
            { name: "Nano Rig", price: 10, roi: 20, hash: 10 },
            { name: "Starter Box", price: 50, roi: 100, hash: 50 },
            { name: "Silver Rack", price: 250, roi: 500, hash: 250 },
            { name: "Gold Server", price: 1000, roi: 2000, hash: 1000 },
            { name: "Titan Farm", price: 5000, roi: 10000, hash: 5000 }
        ];

        let state = { bal: 0, hash: 0.1 };

        function renderPlans() {
            const container = document.getElementById('plans');
            services.forEach(s => {
                container.innerHTML += `
                    <div class="plan-card">
                        <div class="plan-info">
                            <b>${s.name}</b>
                            <span>Costo: $${s.price} | ROI: $${s.roi}</span>
                            <span class="crypto-tag">Acepta: ⭐ USDT ₿ BTC</span>
                        </div>
                        <button class="btn-buy" onclick="pay(${s.price}, '${s.name}')">INVERTIR</button>
                    </div>`;
            });
        }

        async function pay(usd, planName) {
            // Convertimos USD a Stars (Ratio aproximado: 1 USD = 50 Stars)
            const stars = usd * 50;
            
            tg.showConfirm(`¿Invertir $${usd} (${stars} ⭐) en ${planName}?`, async (ok) => {
                if(ok) {
                    const res = await fetch(`${API}/invoice`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, amount: stars, title: planName })
                    });
                    const { link } = await res.json();
                    tg.openInvoice(link, (status) => {
                        if(status === 'paid') {
                            tg.showAlert("Inversión Exitosa. Minado acelerado.");
                            location.reload();
                        }
                    });
                }
            });
        }

        // Simulación de minado en tiempo real (3.63% diario sobre la inversión)
        setInterval(() => {
            const daily = state.hash * 0.03636;
            state.bal += daily / 86400;
            document.getElementById('bal').innerText = state.bal.toFixed(6);
            document.getElementById('hash').innerText = state.hash.toFixed(1);
        }, 1000);

        renderPlans();
    </script>
</body>
</html>
