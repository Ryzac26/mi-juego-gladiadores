<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gladiadores PvP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; overflow: hidden; }
        
        /* Contenedores principales */
        .screen { display: none; padding: 20px; }
        .active { display: block; }

        /* Estadísticas */
        .stats-bar { background: #333; padding: 10px; display: flex; justify-content: space-around; }
        .gold { color: #f1c40f; font-weight: bold; }

        /* Arena de Combate */
        .arena {
            height: 250px;
            background: linear-gradient(to bottom, #444, #222);
            position: relative;
            margin: 20px 0;
            border-bottom: 5px solid #555;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 20px;
        }

        /* Gladiadores Animados */
        .gladiator {
            width: 80px;
            height: 100px;
            position: relative;
            transition: transform 0.2s;
        }

        .visual { font-size: 50px; } /* Usaremos emojis, pero aquí iría tu imagen */

        /* Animación de Respirar (Idle) */
        .idle { animation: breathe 2s infinite ease-in-out; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Animación de Ataque */
        .attack-left { animation: attackL 0.5s; }
        @keyframes attackL {
            0% { transform: translateX(0); }
            50% { transform: translateX(100px) rotate(10deg); }
            100% { transform: translateX(0); }
        }

        .attack-right { animation: attackR 0.5s; }
        @keyframes attackR {
            0% { transform: translateX(0); }
            50% { transform: translateX(-100px) rotate(-10deg); }
            100% { transform: translateX(0); }
        }

        /* Barras de Vida */
        .hp-container { width: 100px; background: red; height: 10px; border-radius: 5px; margin-bottom: 5px; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }

        button {
            background: #e67e22; color: white; border: none; padding: 15px 30px;
            font-size: 18px; border-radius: 10px; cursor: pointer;
        }
        .log { background: #000; height: 100px; overflow-y: scroll; font-size: 12px; padding: 10px; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <span>💰 <span id="gold">0</span></span>
        <span>⚔️ Nivel: <span id="lvl">1</span></span>
    </div>

    <!-- PANTALLA PRINCIPAL -->
    <div id="lobby" class="screen active">
        <h1>Mi Gladiador</h1>
        <div class="gladiator idle"><div class="visual">🛡️</div></div>
        <p>¿Listo para la arena?</p>
        <button onclick="startBattle()">BUSCAR PELEA (PvP)</button>
    </div>

    <!-- PANTALLA DE COMBATE -->
    <div id="combat" class="screen">
        <div class="arena">
            <!-- Jugador -->
            <div>
                <div class="hp-container"><div id="hp-player" class="hp-fill"></div></div>
                <div id="player-sprite" class="gladiator idle"><div class="visual">🛡️</div></div>
                <span>Tú</span>
            </div>

            <!-- Enemigo -->
            <div>
                <div class="hp-container"><div id="hp-enemy" class="hp-fill"></div></div>
                <div id="enemy-sprite" class="gladiator idle"><div class="visual">👹</div></div>
                <span>Enemigo</span>
            </div>
        </div>
        <div id="battle-log" class="log">Iniciando combate...</div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        let gold = 0;
        let playerStats = { hp: 100, maxHp: 100, atk: 15, premium: false };
        let enemyStats = { hp: 80, maxHp: 80, atk: 10 };

        function startBattle() {
            document.getElementById('lobby').classList.remove('active');
            document.getElementById('combat').classList.add('active');
            
            // Reset vidas
            playerStats.hp = playerStats.maxHp;
            enemyStats.hp = 80 + (Math.random() * 40);
            enemyStats.maxHp = enemyStats.hp;
            updateHP();
            
            setTimeout(battleTurn, 1000);
        }

        function battleTurn() {
            if (playerStats.hp <= 0 || enemyStats.hp <= 0) return endGame();

            // --- TURNO JUGADOR ---
            const pSprite = document.getElementById('player-sprite');
            pSprite.classList.remove('idle');
            pSprite.classList.add('attack-left');
            
            let pDmg = playerStats.atk + Math.floor(Math.random() * 5);
            enemyStats.hp -= pDmg;
            log(`Atacas al enemigo y quitas ${pDmg} HP`);

            setTimeout(() => {
                pSprite.classList.remove('attack-left');
                pSprite.classList.add('idle');
                updateHP();

                if (enemyStats.hp <= 0) return endGame();

                // --- TURNO ENEMIGO (Después de 1 segundo) ---
                setTimeout(() => {
                    const eSprite = document.getElementById('enemy-sprite');
                    eSprite.classList.remove('idle');
                    eSprite.classList.add('attack-right');
                    
                    let eDmg = enemyStats.atk + Math.floor(Math.random() * 5);
                    playerStats.hp -= eDmg;
                    log(`¡El enemigo te golpea por ${eDmg} HP!`);

                    setTimeout(() => {
                        eSprite.classList.remove('attack-right');
                        eSprite.classList.add('idle');
                        updateHP();
                        
                        if (playerStats.hp <= 0) return endGame();
                        setTimeout(battleTurn, 1000);
                    }, 500);
                }, 800);

            }, 500);
        }

        function updateHP() {
            document.getElementById('hp-player').style.width = (playerStats.hp / playerStats.maxHp * 100) + "%";
            document.getElementById('hp-enemy').style.width = (enemyStats.hp / enemyStats.maxHp * 100) + "%";
        }

        function log(msg) {
            const l = document.getElementById('battle-log');
            l.innerHTML += `<br>${msg}`;
            l.scrollTop = l.scrollHeight;
        }

        function endGame() {
            if (playerStats.hp > 0) {
                log("<b style='color:lime'>¡VICTORIA! Ganaste 50 monedas.</b>");
                gold += 50;
                document.getElementById('gold').innerText = gold;
            } else {
                log("<b style='color:red'>DERROTA... Entrena más.</b>");
            }
            
            setTimeout(() => {
                document.getElementById('combat').classList.remove('active');
                document.getElementById('lobby').classList.add('active');
                document.getElementById('battle-log').innerHTML = "Iniciando combate...";
            }, 3000);
        }
    </script>
</body>
</html>
