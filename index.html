<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gladiator Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .stat-card { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .gladiator-list { display: flex; flex-direction: column; gap: 10px; }
        .gladiator-item { background: #444; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #e67e22; border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #7f8c8d; }
        .claim-btn { background: #27ae60; width: 100%; padding: 20px; font-size: 1.2em; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="stat-card">
        <h2>Mi Ludus</h2>
        <p>Oro: <span id="gold">0</span> 💰</p>
        <p>Gloria Acumulada: <span id="glory">0</span> ⚔️</p>
        <p>Producción: <span id="pps">0</span> gloria/seg</p>
        <button class="claim-btn" onclick="claimGlory()">RECLAMAR GLORIA</button>
    </div>

    <h3>Mercado de Gladiadores</h3>
    <div class="gladiator-list" id="gladiator-market">
        <!-- Los gladiadores se generan aquí con JS -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Estado inicial del juego
        let gameState = {
            gold: 100,
            accumulatedGlory: 0,
            gladiatorsOwned: [0, 0, 0], // Cantidad de cada tipo
            lastUpdate: Date.now()
        };

        const gladiatorTypes = [
            { id: 0, name: "Esclavo", cost: 50, production: 1 },
            { id: 1, name: "Reciario", cost: 500, production: 12 },
            { id: 2, name: "Murmillo", cost: 2500, production: 70 }
        ];

        function updateUI() {
            document.getElementById('gold').innerText = Math.floor(gameState.gold);
            document.getElementById('glory').innerText = Math.floor(gameState.accumulatedGlory);
            
            let totalPPS = 0;
            gladiatorTypes.forEach(g => {
                totalPPS += gameState.gladiatorsOwned[g.id] * g.production;
            });
            document.getElementById('pps').innerText = totalPPS;

            renderMarket();
        }

        function renderMarket() {
            const container = document.getElementById('gladiator-market');
            container.innerHTML = '';
            gladiatorTypes.forEach(g => {
                const item = document.createElement('div');
                item.className = 'gladiator-item';
                item.innerHTML = `
                    <div>
                        <strong>${g.name}</strong> (Posees: ${gameState.gladiatorsOwned[g.id]})<br>
                        Coste: ${g.cost} 💰 | +${g.production} gloria/s
                    </div>
                    <button onclick="buyGladiator(${g.id})" ${gameState.gold < g.cost ? 'disabled' : ''}>COMPRAR</button>
                `;
                container.appendChild(item);
            });
        }

        function buyGladiator(id) {
            if (gameState.gold >= gladiatorTypes[id].cost) {
                gameState.gold -= gladiatorTypes[id].cost;
                gameState.gladiatorsOwned[id]++;
                updateUI();
            }
        }

        function claimGlory() {
            // En Grow Tea, la gloria se convierte en oro al reclamar
            gameState.gold += gameState.accumulatedGlory;
            gameState.accumulatedGlory = 0;
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Bucle principal (se ejecuta cada segundo)
        setInterval(() => {
            let totalPPS = 0;
            gladiatorTypes.forEach(g => {
                totalPPS += gameState.gladiatorsOwned[g.id] * g.production;
            });
            
            if (totalPPS > 0) {
                gameState.accumulatedGlory += totalPPS;
                updateUI();
            }
        }, 1000);

        // Inicializar
        updateUI();
    </script>
</body>
</html>
