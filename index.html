<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Gladiator: Blood & Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; text-align: center; image-rendering: pixelated; margin: 0; }
        .pixel-border { border: 4px solid #fff; padding: 10px; margin: 10px; background: #1a1a1a; }
        .gold-text { color: #f1c40f; font-size: 1.5em; text-shadow: 2px 2px #000; }
        
        @keyframes idle { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .sprite { font-size: 50px; animation: idle 1s infinite; margin: 20px; }

        .btn { background: #960000; color: #fff; border: 4px solid #fff; padding: 15px; width: 80%; font-family: inherit; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #444; border-color: #888; }

        .market { border: 2px dashed #f1c40f; margin: 20px; padding: 10px; }
        .shop-item { display: flex; justify-content: space-between; align-items: center; background: #222; margin: 5px 0; padding: 10px; font-size: 0.8em; }
        .price-stars { color: #00d2ff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="pixel-border">
        <div class="gold-text">ORO: <span id="gold">0</span> 💰</div>
        <div style="font-size: 0.7em;">PROD: <span id="pps">0</span> gloria/s</div>
        <div style="font-size: 0.7em;">MULT: x<span id="multi">1</span></div>
    </div>

    <div class="sprite">🛡️</div>

    <button class="btn" onclick="claim()">RECLAMAR ORO (⚔️ <span id="glory">0</span>)</button>

    <div class="market">
        <div style="color:#f1c40f; font-size: 0.6em;">TIENDA DEL CÉSAR (USD)</div>
        <div class="shop-item">
            <span>ENTRENAMIENTO DIVINO (X2)</span>
            <span class="price-stars" onclick="buyStars('x2')">⭐ 250</span>
        </div>
    </div>

    <div id="shop" style="padding: 10px;"></div>

    <script>
        const tg = window.Telegram.WebApp;
        const API = "TU_URL_DE_RENDER"; // <--- CAMBIA ESTO
        tg.expand();

        let state = { gold: 100, glory: 0, owned: [0,0,0,0], multi: 1 };
        const gladiators = [
            { id:0, name: "Esclavo", cost: 20, p: 1 },
            { id:1, name: "Thraex", cost: 300, p: 8 },
            { id:2, name: "Murmillo", cost: 2000, p: 40 },
            { id:3, name: "Campeón", cost: 15000, p: 200 }
        ];

        async function sync(save = false) {
            const res = await fetch(`${API}/sync`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: tg.initDataUnsafe.user.id,
                    username: tg.initDataUnsafe.user.username,
                    gold: state.gold, glory: state.glory, owned: state.owned, multi: state.multi,
                    save: save
                })
            });
            const data = await res.json();
            if(data.id) {
                state.gold = Number(data.gold);
                state.multi = data.multi;
                state.owned = data.owned;
            }
            render();
        }

        function calculatePPS() {
            let p = 0;
            gladiators.forEach(g => p += state.owned[g.id] * g.p);
            return p * state.multi;
        }

        function render() {
            document.getElementById('gold').innerText = Math.floor(state.gold).toLocaleString();
            document.getElementById('pps').innerText = calculatePPS();
            document.getElementById('multi').innerText = state.multi;
            
            const shop = document.getElementById('shop');
            shop.innerHTML = '';
            gladiators.forEach(g => {
                const cost = Math.floor(g.cost * Math.pow(1.45, state.owned[g.id]));
                shop.innerHTML += `
                    <div class="shop-item">
                        <span>${g.name} (x${state.owned[g.id]})</span>
                        <button onclick="buy(${g.id}, ${cost})" ${state.gold < cost ? 'disabled' : ''}>${cost} 💰</button>
                    </div>`;
            });
        }

        function buy(id, cost) {
            if(state.gold >= cost) {
                state.gold -= cost;
                state.owned[id]++;
                render();
                sync(true);
            }
        }

        function claim() {
            state.gold += state.glory;
            state.glory = 0;
            tg.HapticFeedback.impactOccurred('heavy');
            sync(true);
        }

        async function buyStars(type) {
            const res = await fetch(`${API}/invoice`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, type })
            });
            const { link } = await res.json();
            tg.openInvoice(link, (status) => {
                if(status === 'paid') location.reload();
            });
        }

        setInterval(() => {
            state.glory += (calculatePPS() / 10);
            document.getElementById('glory').innerText = Math.floor(state.glory).toLocaleString();
        }, 100);

        // Guardado automático cada 60s
        setInterval(() => sync(true), 60000);

        sync();
    </script>
</body>
</html>
